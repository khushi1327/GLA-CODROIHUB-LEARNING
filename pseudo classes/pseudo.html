<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./pseudo.css">
</head>
<body>
    <h1>Pseudo class</h1>
    <p>it allows us to style an element based on its state or position pseudo classes ex: hover,active,focus,visited,link,first-child,last-child,nth-child(),,checked,disable</p>
    <section>
        <h3>Hover and Active</h3>
        <button class="btn">Hover Me</button>
    </section>
    <section>
        <h3>Focus</h3>
        <input class="inputFocus" type="text"
        placeholder="Enter Name">

    </section>
    <section>
        <h3>Box Shadow</h3>
        <div class="box normal">Normal Shadow</div>
        <div class="box glow">glow Shadow</div>
        <div class="box multiple">multiple Shadow</div>
        <div class="box inset">inset Shadow</div>
</body>
</html>
