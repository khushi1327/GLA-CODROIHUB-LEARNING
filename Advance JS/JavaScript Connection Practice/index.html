<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Connection Practice</title>
    <!-- Internal javascript -->
    <script>
        console.log("Hello! This message is from Internal javascript");
    </script>
    <!-- External javascript -->
    <script src="script.js"></script>
</head>
<body>
    <h1>Javascript Connection Practice</h1>
    <!-- Inline javascript -->
    <button onclick="alert('Hello! This alert is from Inline javascript.')"></button>
</body>
</html>
